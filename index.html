<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="absolute inset-0 bg-gray-900 flex flex-col items-center justify-center z-50">
        <svg class="pop-loader h-16 w-16 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.828 0l-4.244-4.243a8 8 0 1111.314 0z" />
        </svg>
        <div class="text-xl font-bold text-gray-300 mt-4" id="loading-text">Loading latest schedules...</div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="w-full max-w-md bg-gray-800 rounded-lg shadow-2xl p-6 hidden">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">Metrorail Train Schedules</h1>
            <p id="current-time" class="text-lg text-blue-400 font-medium"></p>
            <p id="current-day" class="text-sm text-gray-400"></p>
        </div>

        <!-- Station Selector -->
        <div class="mb-6">
            <label for="station-select" class="block text-sm font-medium text-gray-300 mb-2">From Station:</label>
            <select id="station-select" class="block w-full bg-gray-700 border-gray-600 text-white rounded-md shadow-sm p-3 text-lg focus:ring-blue-500 focus:border-blue-500">
                <option value="">Select a station...</option>
            </select>
        </div>

        <!-- Train Times -->
        <div class="space-y-6">
            <!-- Pretoria Card -->
            <div class="bg-gray-700 rounded-lg p-4 shadow-lg">
                <h2 id="pretoria-header" class="text-lg font-semibold text-white mb-2 text-center">
                    Next train to <span class="text-blue-400">Pretoria</span>
                </h2>
                <div id="pretoria-time" class="text-center min-h-[60px] flex items-center justify-center">
                    <!-- Content will be injected by JS -->
                </div>
            </div>

            <!-- Pienaarspoort Card -->
            <div class="bg-gray-700 rounded-lg p-4 shadow-lg">
                <h2 id="pienaarspoort-header" class="text-lg font-semibold text-white mb-2 text-center">
                    Next train to <span class="text-blue-400">Pienaarspoort</span>
                </h2>
                <div id="pienaarspoort-time" class="text-center min-h-[60px] flex items-center justify-center">
                    <!-- Content will be injected by JS -->
                </div>
            </div>
        </div>

        <!-- *** SERVICE UPDATE BUTTON REPLACED *** -->
        <div class="mt-8 text-center">
            <!-- This is now a link (<a>) styled as a button -->
            <a href="https://www.facebook.com/metrorailgp" target="_blank" rel="noopener noreferrer" id="check-updates-btn" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-transform transform hover:scale-105">
                🚄 View Official Metrorail Updates
            </a>
            <p class="text-xs text-gray-500 mt-2">Opens the official Facebook page.</p>
        </div>
    </div>
    
    <!-- *** GEMINI API MODAL REMOVED *** -->


    <script>
        // --- DOM Elements ---
        const stationSelect = document.getElementById('station-select');
        const pretoriaTimeEl = document.getElementById('pretoria-time');
        const pienaarspoortTimeEl = document.getElementById('pienaarspoort-time');
        const pretoriaHeader = document.getElementById('pretoria-header');
        const pienaarspoortHeader = document.getElementById('pienaarspoort-header');
        const currentTimeEl = document.getElementById('current-time');
        const currentDayEl = document.getElementById('current-day');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const mainContent = document.getElementById('main-content');
        
        // --- *** Gemini Modal Elements Removed *** ---

        // --- Constants ---
        const DESTINATION_PRETORIA = 'PRETORIA STATION';
        const DESTINATION_PIENAARSPOORT = 'PIENAARSPOORT STATION';
        // This is the station where the "To Pretoria" line terminates (e.g., Train 1120)
        const TO_PRETORIA_TERMINATION_STATION = 'KOEDOESPOORT STATION';
        // This is the station where the connecting train (e.g., 1166) can be boarded
        const TO_PRETORIA_CONNECTION_STATION = 'KOEDOESPOORT STATION';
        
        // This is the public base URL for your Google Sheet
        const sheetBaseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWJYv6XmGlTXuubFKucoIZNShBnW5I0J5TQ8ybwl6GtTZ6ioRUTOM2OcVN364mu36u36mS9Ey-sYG0/pub?output=csv';
        
        // These are the unique 'gid's for each tab
        const sheetGids = {
            weekday_to_pretoria: '0',
            weekday_to_pienaarspoort: '840560909',
            saturday_to_pretoria: '936760708',
            saturday_to_pienaarspoort: '146806560'
        };

        // --- State ---
        let schedules = {};
        let allStations = [];
        let currentTime = null;
        let currentDayType = 'weekday'; // 'weekday', 'saturday', or 'sunday'
        let currentDayIndex = 0; // 0=Sun, 1-5=Weekday, 6=Sat

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadAllSchedules();
            stationSelect.addEventListener('change', findNextTrains);
        });

        // --- Schedule Loading ---
        
        /**
         * Fetches all 4 schedules from Google Sheets
         */
        async function loadAllSchedules() {
            try {
                const [
                    wdPienPret,
                    wdPretPien,
                    satPienPret,
                    satPretPien
                ] = await Promise.all([
                    fetchSchedule('weekday_to_pretoria', sheetGids.weekday_to_pretoria),
                    fetchSchedule('weekday_to_pienaarspoort', sheetGids.weekday_to_pienaarspoort),
                    fetchSchedule('saturday_to_pretoria', sheetGids.saturday_to_pretoria),
                    fetchSchedule('saturday_to_pienaarspoort', sheetGids.saturday_to_pienaarspoort)
                ]);

                schedules = {
                    weekday_to_pretoria: parseSchedule(wdPienPret),
                    weekday_to_pienaarspoort: parseSchedule(wdPretPien),
                    saturday_to_pretoria: parseSchedule(satPienPret),
                    saturday_to_pienaarspoort: parseSchedule(satPretPien)
                };
                
                // Populate the station list from all available schedules
                populateStationList();
                
                // Start the clock and main app functions
                startClock();

                // Hide loading and show content
                loadingOverlay.style.display = 'none';
                mainContent.style.display = 'block';

            } catch (error) {
                console.error("Error loading schedules:", error);
                loadingText.textContent = `Error: ${error.message}. Please check network.`;
                loadingText.classList.add('text-red-500');
            }
        }

        /**
         * Fetches a single schedule CSV from Google Sheets
         */
        async function fetchSchedule(name, gid) {
            // --- FIX for "Failed to fetch" (CORS) ---
            // We use a free proxy to bypass the browser's security block.
            const proxyUrl = 'https://corsproxy.io/?';
            const originalUrl = `${sheetBaseUrl}&gid=${gid}`;
            const url = `${proxyUrl}${encodeURIComponent(originalUrl)}`; // Correctly encode the URL
            // --- END FIX ---
            
            const response = await fetch(url, { cache: 'no-cache' }); // Use no-cache to get updates
            if (!response.ok) {
                throw new Error(`${name}: Failed to fetch`);
            }
            return await response.text();
        }

        /**
         * Parses raw CSV text into a structured object
         */
        function parseSchedule(csvText) {
            const lines = csvText.trim().split(/\r\n|\n/);
            // Find the first line that starts with "STATION"
            let headerLineIndex = lines.findIndex(line => line.trim().toUpperCase().startsWith('STATION'));
            if (headerLineIndex === -1) {
                // Fallback if "STATION" isn't found, though it should be.
                headerLineIndex = 0; 
                console.warn("Could not find 'STATION' in CSV, assuming header is line 0.");
            }
            
            const headers = lines[headerLineIndex].split(',').map(h => h.trim());
            const stationColumnName = headers[0]; // e.g., "STATION"
            
            const rows = lines.slice(headerLineIndex + 1).map(line => {
                const values = line.split(',');
                const row = {};
                
                // Ensure the first value is a station name, not blank
                if (!values[0] || values[0].trim() === "") {
                    return null; // Skip empty rows
                }
                
                row[stationColumnName] = values[0].trim();
                
                headers.slice(1).forEach((header, index) => {
                    // Make sure header is not empty
                    if (header && header !== "") {
                         row[header] = values[index + 1] ? values[index + 1].trim() : null;
                    }
                });
                return row;
            }).filter(row => row !== null); // Filter out any skipped rows

            return { headers, rows, stationColumnName };
        }
        
        /**
         * Populates the station dropdown from all schedules
         */
        function populateStationList() {
            const stationSet = new Set();
            
            // Add stations from all 4 schedules
            schedules.weekday_to_pretoria.rows.forEach(row => stationSet.add(row[schedules.weekday_to_pretoria.stationColumnName]));
            schedules.weekday_to_pienaarspoort.rows.forEach(row => stationSet.add(row[schedules.weekday_to_pienaarspoort.stationColumnName]));
            
            allStations = Array.from(stationSet);
            
            // We need a defined order. We'll use the "To Pienaarspoort" order as the canonical list
            // from Pretoria (index 0) to Pienaarspoort (last index).
            allStations.sort((a, b) => {
                const schedule = schedules.weekday_to_pienaarspoort;
                const stationCol = schedule.stationColumnName;
                const indexA = schedule.rows.findIndex(row => row[stationCol] === a);
                const indexB = schedule.rows.findIndex(row => row[stationCol] === b);
                return indexA - indexB;
            });
            
            // Now that `allStations` is sorted, populate the dropdown
            stationSelect.innerHTML = '<option value="">Select a station...</option>';
            allStations.forEach(station => {
                if (station) { // Avoid empty station names
                    const option = document.createElement('option');
                    option.value = station;
                    option.textContent = station.replace(/ STATION/g, ''); // Make it cleaner
                    stationSelect.appendChild(option);
                }
            });
        }


        // --- Clock and Time ---
        
        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        function startClock() {
            updateTime();
            setInterval(updateTime, 1000); // Update every second
        }

        function updateTime() {
            let day;
            let timeString;
            
            // --- FOR REAL-TIME USE ---
            // 1. Comment out the "FOR TESTING" block below.
            // 2. Uncomment these three lines.
            const now = new Date(); 
            day = now.getDay(); 
            timeString = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            currentTimeEl.textContent = `Current Time: ${timeString}`;
            
            
            // --- FOR TESTING ---
            // 1. Comment out the three lines above.
            // 2. Uncomment the three lines below to fake the time.
            /*
            const testTimeString = "17:30:00"; // Set any time, e.g., "16:20:00"
            const testDay = 6; // Set any day: 0=Sun, 1-5=Weekday, 6=Sat
            
            timeString = testTimeString;
            day = testDay;
            currentTimeEl.textContent = `Current Time (TEST): ${timeString}`; // Show it's a test
            */
            
            
            // --- END OF TIME BLOCK ---

            // --- *** CORRECTED DAY LOGIC *** ---
            // Check if time or day has meaningfully changed
            let newDayType;
            if (day === 0) {
                newDayType = 'sunday';
            } else if (day === 6) {
                newDayType = 'saturday';
            } else {
                newDayType = 'weekday';
            }
            // --- *** END OF CORRECTION *** ---
            
            const newDayIndex = day;
            
            if (timeString.slice(0, 5) !== currentTime?.slice(0, 5) || newDayType !== currentDayType) {
                // Update global state
                currentTime = timeString;
                currentDayType = newDayType;
                currentDayIndex = day; // Use the 0-6 index directly

                // Update UI
                const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                
                if (currentDayType === 'sunday') {
                    currentDayEl.textContent = "Sunday (No Service)";
                } else if (currentDayType === 'saturday') {
                    currentDayEl.textContent = "Saturday (Saturday Schedule)";
                } else {
                    currentDayEl.textContent = `${dayNames[day]} (Weekday Schedule)`;
                }
                
                // Recalculate trains
                findNextTrains();
            }
        }
        
        /**
         * Calculates the time difference between now and a future time.
         * Returns a formatted string like "(in 22m)" or "(in 1h 30m)".
         */
        function calculateTimeDiffString(departureTimeStr, dayOffset = 0) {
            try {
                // --- BUG FIX: Use full HH:MM:SS for "now" ---
                const [nowH, nowM, nowS] = currentTime.split(':').map(Number);
                // Use HH:MM:SS for departure, adding :00 if missing
                const depParts = departureTimeStr.split(':').map(Number);
                const depH = depParts[0];
                const depM = depParts[1];
                const depS = depParts[2] || 0; // Assume 00 seconds if not provided

                let nowTotalSeconds = (nowH * 3600) + (nowM * 60) + nowS;
                let depTotalSeconds = (depH * 3600) + (depM * 60) + depS;
                
                let diffInSeconds = (depTotalSeconds - nowTotalSeconds) + (dayOffset * 24 * 60 * 60);

                if (diffInSeconds < 0) return ""; // Train has passed
                
                // --- BUG FIX: Use ceil to round up ---
                let diffInMinutes = Math.ceil(diffInSeconds / 60);
                
                if (diffInMinutes === 0) return "(Arriving now)";

                const hours = Math.floor(diffInMinutes / 60);
                const minutes = diffInMinutes % 60;
                
                if (hours > 0) {
                    return `(in ${hours}h ${minutes}m)`;
                } else {
                    return `(in ${minutes}m)`;
                }

            } catch (e) {
                console.error("Error calculating time diff:", e);
                return ""; // Fail gracefully
            }
        }

        // --- *** NEW HELPER FUNCTION *** ---
        /**
         * Converts a "HH:MM:SS" string to total seconds for comparison.
         */
        function timeToSeconds(timeStr) {
            try {
                const parts = timeStr.split(':').map(Number);
                const h = parts[0] || 0;
                const m = parts[1] || 0;
                const s = parts[2] || 0;
                return (h * 3600) + (m * 60) + s;
            } catch (e) {
                console.error(`Invalid time string: ${timeStr}`);
                return 0;
            }
        }


        // --- Core Train Finding Logic ---

        function findNextTrains() {
            const selectedStation = stationSelect.value;
            
            // --- BUG FIX: Clear old content before every calculation ---
            pretoriaTimeEl.innerHTML = "";
            pienaarspoortTimeEl.innerHTML = "";
            // --- END BUG FIX ---
            
            // Reset headers before finding trains
            pretoriaHeader.innerHTML = 'Next train to <span class="text-blue-400">Pretoria</span>';
            pienaarspoortHeader.innerHTML = 'Next train to <span class="text-blue-400">Pienaarspoort</span>';
            
            if (!selectedStation) {
                return;
            }
            
            // --- *** Use currentDayType for Sunday check *** ---
            if (currentDayType === 'sunday') {
                // Handle Sunday (No Service)
                renderNoService(pretoriaTimeEl, 'pretoria');
                renderNoService(pienaarspoortTimeEl, 'pienaarspoort');
                return;
            }

            // --- Find Journey to Pretoria ---
            if (selectedStation === DESTINATION_PRETORIA) {
                renderAtDestination(pretoriaTimeEl);
            } else {
                const schedule = (currentDayType === 'weekday') ? schedules.weekday_to_pretoria : schedules.saturday_to_pretoria;
                const { nextJourney, firstTrainName, lastTrainName } = findNextJourneyToPretoria(selectedStation, currentTime, schedule);
                
                if (nextJourney) {
                    // Mark if it's the first or last
                    const journeyTrainName = nextJourney.train || nextJourney.train1.train;
                    nextJourney.isFirstTrain = (journeyTrainName === firstTrainName);
                    nextJourney.isLastTrain = (journeyTrainName === lastTrainName);
                }
                renderJourney(pretoriaTimeEl, pretoriaHeader, nextJourney, firstTrainName, DESTINATION_PRETORIA, 'pretoria');
            }

            // --- Find Journey to Pienaarspoort ---
            if (selectedStation === DESTINATION_PIENAARSPOORT) {
                renderAtDestination(pienaarspoortTimeEl);
            } else {
                const schedule = (currentDayType === 'weekday') ? schedules.weekday_to_pienaarspoort : schedules.saturday_to_pienaarspoort;
                // "To Pienaarspoort" is always a direct train, so we use a simpler function
                const { allJourneys, firstTrainName, lastTrainName } = findNextDirectTrain(selectedStation, schedule, DESTINATION_PIENAARSPOORT);
                
                // --- *** BUG FIX: Compare seconds, not strings, and use >= *** ---
                const nowInSeconds = timeToSeconds(currentTime);
                const remainingJourneys = allJourneys.filter(j => timeToSeconds(j.departureTime) >= nowInSeconds);
                
                let nextJourney = null;
                if (remainingJourneys.length > 0) {
                    nextJourney = remainingJourneys[0];
                    // Mark if it's the first or last
                    nextJourney.isFirstTrain = (nextJourney.train === firstTrainName);
                    // isLastTrain is true if it's the last one *and* it has the name of the last train
                    const allRemainingTrainNames = new Set(remainingJourneys.map(j => j.train));
                    nextJourney.isLastTrain = (allRemainingTrainNames.size === 1 && nextJourney.train === lastTrainName);
                }
                renderJourney(pienaarspoortTimeEl, pienaarspoortHeader, nextJourney, firstTrainName, DESTINATION_PIENAARSPOORT, 'pienaarspoort');
            }
        }
        
        /**
         * Finds the next journey (direct or transfer) to Pretoria.
         */
        function findNextJourneyToPretoria(fromStation, timeNow, schedule) {
            
            // Find ALL direct trains for the whole day
            const { allJourneys: allDirectJourneys } = findNextDirectTrain(fromStation, schedule, DESTINATION_PRETORIA);

            // Find ALL transfer trains for the whole day
            let allTransferJourneys = [];
            
            // Check if a transfer is even possible from this station
            const fromStationIndex = allStations.indexOf(fromStation);
            const terminationStationIndex = allStations.indexOf(TO_PRETORIA_TERMINATION_STATION);
            
            // Only find transfers if you are *at* or *before* the termination station
            if (fromStationIndex <= terminationStationIndex) {
                 const { allJourneys: allTransfers } = findNextTransferToPretoria(fromStation, schedule);
                 allTransferJourneys = allTransfers;
            }

            // Combine all possible journeys
            const allJourneys = [...allDirectJourneys, ...allTransferJourneys];

            // Sort them by departure time
            allJourneys.sort((a, b) => timeToSeconds(a.departureTime) - timeToSeconds(b.departureTime));

            // Find first/last train *name* based on schedule column order
            const { firstTrainName, lastTrainName } = getFirstAndLastTrainNames(schedule, fromStation);
            
            // --- *** BUG FIX: Compare seconds, not strings, and use >= *** ---
            const nowInSeconds = timeToSeconds(timeNow);
            // Find the next journey after timeNow
            const remainingJourneys = allJourneys.filter(j => timeToSeconds(j.departureTime) >= nowInSeconds);
            
            if (remainingJourneys.length === 0) {
                return { nextJourney: null, firstTrainName, lastTrainName }; // No trains found
            }

            // Get the earliest (next) journey
            const nextJourney = remainingJourneys[0];

            return { nextJourney, firstTrainName, lastTrainName };
        }
        
        
        /**
         * Finds all direct (non-transfer) trains for the whole day.
         */
        function findNextDirectTrain(fromStation, schedule, destinationStation) {
            const stationCol = schedule.stationColumnName;
            const trainHeaders = schedule.headers.slice(1);
            let allJourneys = [];
            
            // Find first/last train *name* based on schedule column order
            const { firstTrainName, lastTrainName } = getFirstAndLastTrainNames(schedule, fromStation);

            for (const train of trainHeaders) {
                // Ensure train header is valid
                if (!train || train === "") continue;

                const departureTime = schedule.rows
                    .find(row => row[stationCol] === fromStation)?.[train];
                
                const destinationTime = schedule.rows
                    .find(row => row[stationCol] === destinationStation)?.[train];
                
                // 1. Must have a time at the from station
                // 2. Must have a time at the destination station (i.e., it's direct)
                if (departureTime && destinationTime) {
                    allJourneys.push({
                        type: 'direct',
                        train: train,
                        departureTime: departureTime,
                        arrivalTime: destinationTime
                    });
                }
            }
            // Sort all found journeys by time
            allJourneys.sort((a, b) => timeToSeconds(a.departureTime) - timeToSeconds(b.departureTime));
            
            return { allJourneys, firstTrainName, lastTrainName };
        }

        /**
         * Finds all transfer journeys to Pretoria for the whole day.
         */
        function findNextTransferToPretoria(fromStation, schedule) {
            const stationCol = schedule.stationColumnName;
            const trainHeaders = schedule.headers.slice(1);
            let allJourneys = [];

            // 1. Find all trains from `fromStation` that terminate
            for (const train1 of trainHeaders) {
                // Ensure train header is valid
                if (!train1 || train1 === "") continue;
                
                const departureTime = schedule.rows
                    .find(row => row[stationCol] === fromStation)?.[train1];
                
                const terminationTime = schedule.rows
                    .find(row => row[stationCol] === TO_PRETORIA_TERMINATION_STATION)?.[train1];
                
                const destinationTime = schedule.rows
                    .find(row => row[stationCol] === DESTINATION_PRETORIA)?.[train1];

                // This is a terminating train if:
                // 1. It has a time at our station
                // 2. It has a time at the termination station
                // 3. It does NOT have a time at the final destination
                if (departureTime && terminationTime && !destinationTime) {
                    
                    // 2. Find the earliest valid connection for THIS train
                    // The connection must be after the train arrives at the transfer station
                    const connection = findNextConnectingTrain(terminationTime, schedule);
                    
                    if (connection) {
                        allJourneys.push({
                            type: 'transfer',
                            departureTime: departureTime, // Top-level departure time for sorting
                            train1: {
                                train: train1,
                                departureTime: departureTime,
                                arrivalAtTransfer: terminationTime,
                                terminationStation: TO_PRETORIA_TERMINATION_STATION
                            },
                            connection: connection
                        });
                    }
                }
            }
            // Sort all found journeys by time
            allJourneys.sort((a, b) => timeToSeconds(a.departureTime) - timeToSeconds(b.departureTime));
            
            return { allJourneys };
        }

        /**
         * Finds the first available connecting train from the connection station.
         */
        function findNextConnectingTrain(arrivalTimeAtTransfer, schedule) {
            const stationCol = schedule.stationColumnName;
            const trainHeaders = schedule.headers.slice(1);
            let possibleConnections = [];

            for (const train of trainHeaders) {
                // Ensure train header is valid
                if (!train || train === "") continue;

                // Find connection time at the *connection* station
                const connectionTime = schedule.rows
                    .find(row => row[stationCol] === TO_PRETORIA_CONNECTION_STATION)?.[train];
                
                // Find destination time at the *final* destination
                const destinationTime = schedule.rows
                    .find(row => row[stationCol] === DESTINATION_PRETORIA)?.[train];

                // A valid connection is:
                // 1. A train that has a time at the connection station
                // 2. A train that has a time at the final destination
                // 3. A train that leaves AFTER the first train arrives
                // --- *** BUG FIX: Compare seconds, not strings, and use >= *** ---
                if (connectionTime && destinationTime && timeToSeconds(connectionTime) >= timeToSeconds(arrivalTimeAtTransfer)) {
                    possibleConnections.push({
                        train: train,
                        departureTime: connectionTime,
                        arrivalTime: destinationTime,
                        connectionStation: TO_PRETORIA_CONNECTION_STATION
                    });
                }
            }
            
            // Sort connections by time and return the earliest one
            if (possibleConnections.length === 0) {
                return null;
            }
            // Return the one that leaves *soonest* after the arrival
            return possibleConnections.sort((a, b) => timeToSeconds(a.departureTime) - timeToSeconds(b.departureTime))[0];
        }
        
        /**
         * Gets the column name of the first and last trains from the schedule headers
         * that have a time at the specified station.
         */
        function getFirstAndLastTrainNames(schedule, fromStation) {
            const stationCol = schedule.stationColumnName;
            const trainHeaders = schedule.headers.slice(1).filter(h => h && h !== ""); // Filter out empty headers
            
            const stationRow = schedule.rows.find(row => row[stationCol] === fromStation);
            
            if (!stationRow) {
                return { firstTrainName: null, lastTrainName: null };
            }

            // Find first train (left-most column) with a time
            let firstTrainName = null;
            for (const trainName of trainHeaders) {
                if (stationRow[trainName]) {
                    firstTrainName = trainName;
                    break;
                }
            }

            // Find last train (right-most column) with a time
            let lastTrainName = null;
            // Iterate in reverse to find the last valid train
            for (let i = trainHeaders.length - 1; i >= 0; i--) {
                const trainName = trainHeaders[i];
                if (stationRow[trainName]) {
                    lastTrainName = trainName;
                    break;
                }
            }
            
            return { firstTrainName, lastTrainName };
        }


        // --- UI Rendering ---

        function renderJourney(element, headerElement, journey, firstTrainName, destination, scheduleKey) {
            // --- BUG FIX: Clear element content ---
            element.innerHTML = "";
            // --- END BUG FIX ---

            if (!journey) {
                // No more trains *today*. Find tomorrow's first train.
                renderNextAvailableTrain(element, destination, scheduleKey);
                return;
            }

            // Check for last/first train
            let timeClass = "bg-gray-900";
            
            if (journey.isLastTrain) {
                timeClass = "bg-red-900 border-2 border-red-500"; // Red-bordered background
                // Update header
                headerElement.innerHTML += ' <span class="text-red-400 text-base">(Last train)</span>';
            } else if (journey.isFirstTrain) {
                timeClass = "bg-green-900 border-2 border-green-500"; // Green-bordered background
                // Per request, no text for first train, just color
            }
            
            const departureTime = journey.departureTime || journey.train1.departureTime;
            const timeDiffStr = calculateTimeDiffString(departureTime);

            if (journey.type === 'direct') {
                element.innerHTML = `
                    <div class="text-center p-4 ${timeClass} rounded-md transition-all">
                        <div class="text-3xl font-bold">${journey.departureTime}</div>
                        <div class="text-lg text-gray-300 font-medium">${timeDiffStr}</div>
                    </div>
                    <p class="text-sm text-yellow-400 mt-2 text-center">
                        Direct train (${journey.train}). Arrives ${journey.arrivalTime}.
                    </p>
                `;
            }

            if (journey.type === 'transfer') {
                element.innerHTML = `
                    <div class="text-center p-4 ${timeClass} rounded-md transition-all">
                        <div class="text-3xl font-bold">${journey.train1.departureTime}</div>
                        <div class="text-lg text-gray-300 font-medium">${timeDiffStr}</div>
                    </div>
                    <div class="text-sm text-yellow-400 mt-2 text-center space-y-1">
                        <p>
                            Train ${journey.train1.train} (Terminates at ${journey.train1.terminationStation} at ${journey.train1.arrivalAtTransfer})
                        </p>
                        <p class="font-bold text-lg">TRANSFER REQUIRED</p>
                        <p>
                            Connect to Train ${journey.connection.train} from ${journey.connection.connectionStation} at ${journey.connection.departureTime}.
                        </p>
                    </div>
                `;
            }
        }
        
        // --- *** NEW, IMPROVED renderNextAvailableTrain FUNCTION *** ---
        function renderNextAvailableTrain(element, destination, scheduleKey) {
            let nextDayName = "";
            let nextDayScheduleKey = "";
            let dayOffset = 1; // 1 = tomorrow

            // currentDayIndex: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
            switch (currentDayIndex) {
                case 6: // Saturday
                    nextDayName = "Monday";
                    dayOffset = 2; // Sat -> Mon is 2 days
                    nextDayScheduleKey = (scheduleKey === 'pretoria') ? 'weekday_to_pretoria' : 'weekday_to_pienaarspoort';
                    break;
                case 5: // Friday
                    nextDayName = "Saturday";
                    dayOffset = 1;
                    nextDayScheduleKey = (scheduleKey === 'pretoria') ? 'saturday_to_pretoria' : 'saturday_to_pienaarspoort';
                    break;
                default: // Mon-Thu
                    nextDayName = "tomorrow";
                    dayOffset = 1;
                    nextDayScheduleKey = (scheduleKey === 'pretoria') ? 'weekday_to_pretoria' : 'weekday_to_pienaarspoort';
                    break;
            }
            
            const nextSchedule = schedules[nextDayScheduleKey];
            if (!nextSchedule) {
                console.error(`Could not find next schedule for key: ${nextDayScheduleKey}`);
                element.innerHTML = `<div class="text-xl font-bold text-gray-400">No schedule found for next service day.</div>`;
                return;
            }

            const selectedStation = stationSelect.value;
            let firstTrainOfNextDay = null;

            if (scheduleKey === 'pretoria') {
                // Find first journey (direct or transfer) to Pretoria
                const { nextJourney } = findNextJourneyToPretoria(selectedStation, "00:00:00", nextSchedule);
                firstTrainOfNextDay = nextJourney;
            } else {
                // Find first direct train to Pienaarspoort
                const { allJourneys } = findNextDirectTrain(selectedStation, nextSchedule, DESTINATION_PIENAARSPOORT);
                firstTrainOfNextDay = (allJourneys.length > 0) ? allJourneys[0] : null;
            }

            if (!firstTrainOfNextDay) {
                element.innerHTML = `
                    <div class="text-xl font-bold text-gray-400">
                        No trains found for ${nextDayName}.
                    </div>
                `;
                return;
            }
            
            const departureTime = firstTrainOfNextDay.departureTime || firstTrainOfNextDay.train1.departureTime;
            const timeDiffStr = calculateTimeDiffString(departureTime, dayOffset);

            element.innerHTML = `
                <div class="text-lg font-bold text-gray-400">
                    No more trains today.
                </div>
                <p class="text-sm text-gray-500 mt-2">First train ${nextDayName} is at:</p>
                <div class="text-center p-3 bg-gray-900 rounded-md transition-all mt-2">
                    <div class="text-2xl font-bold">${departureTime}</div>
                    <div class="text-base text-gray-300 font-medium">${timeDiffStr}</div>
                </div>
            `;
        }
        // --- *** END OF NEW FUNCTION *** ---


        function renderAtDestination(element) {
            element.innerHTML = `
                <div class="text-xl font-bold text-green-400">
                    You are at this station.
                </div>
            `;
        }

        function renderNoService(element, destination) {
            
            // On Sunday, find Monday's first train
            const scheduleKey = (destination === 'pretoria') ? 'weekday_to_pretoria' : 'weekday_to_pienaarspoort';
            const schedule = schedules[scheduleKey];
            const selectedStation = stationSelect.value;
            let firstTrain = null;
            
            if (destination === 'pretoria') {
                 const { nextJourney } = findNextJourneyToPretoria(selectedStation, "00:00:00", schedule);
                 firstTrain = nextJourney;
            } else {
                 const { allJourneys } = findNextDirectTrain(selectedStation, schedule, DESTINATION_PIENAARSPOORT);
                 firstTrain = (allJourneys.length > 0) ? allJourneys[0] : null;
            }
            
            let timeHTML = 'N/A';
            if (firstTrain) {
                const departureTime = firstTrain.departureTime || firstTrain.train1.departureTime;
                const timeDiffStr = calculateTimeDiffString(departureTime, 1); // 1 = tomorrow (Monday)
                timeHTML = `
                    <div class="text-2xl font-bold">${departureTime}</div>
                    <div class="text-base text-gray-300 font-medium">${timeDiffStr}</div>
                `;
            }

             element.innerHTML = `
                <div class="text-xl font-bold text-gray-400">
                    No service on Sundays.
                </div>
                <p class="text-sm text-gray-500 mt-2">First train Monday is at:</p>
                <div id="next-day-${destination}-time" class="text-center p-3 bg-gray-900 rounded-md transition-all mt-2">
                    ${timeHTML}
                </div>
            `;
        }
