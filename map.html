        // 🛡️ GUARDIAN PHASE 2: Asynchronous Local DB Extractor
        async function fetchLocalDB(region) {
            const cacheKey = `full_db_${region}`;
            
            // 1. Try IndexedDB (V6.00.12+ Standard)
            try {
                const db = await new Promise((resolve, reject) => {
                    if (!window.indexedDB) reject();
                    const req = indexedDB.open('NextTrainDB', 1);
                    req.onerror = () => reject();
                    req.onsuccess = (e) => resolve(e.target.result);
                });
                if (db && db.objectStoreNames.contains('SchedulesStore')) {
                    const data = await new Promise((resolve) => {
                        const tx = db.transaction('SchedulesStore', 'readonly');
                        const store = tx.objectStore('SchedulesStore');
                        const req = store.get(cacheKey);
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => resolve(null);
                    });
                    if (data && data.data) return data.data;
                }
            } catch(e) { console.warn("IDB fetch failed, falling back to LocalStorage."); }
            
            // 2. Fallback to LocalStorage (Legacy Standard)
            try {
                const ls = localStorage.getItem(cacheKey);
                if (ls) {
                    const parsed = JSON.parse(ls);
                    return parsed.data ? parsed.data : parsed;
                }
            } catch(e) { console.warn("LS fetch failed."); }
            
            return null;
        }

            if (!db) return null;
            let regionalData = {};
            if (region === 'GP' && db.gauteng) regionalData = db.gauteng;
            else if (region === 'WC' && db.westerncape) regionalData = db.westerncape;
            else if (region === 'GP' && db.schedules && !db.gauteng) regionalData = db.schedules;
            return { ...db, ...regionalData };
        };

            }

            const map = L.map('map', { zoomControl: false }).setView([initLat, initLon], initZoom); 
            
            L.control.zoom({ position: 'bottomleft' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            // Fetch Database
            const rawDb = await fetchLocalDB(currentRegion);
            if (!rawDb) throw new Error("No Local Database Cached");
            const mergedDb = unwrapDatabase(rawDb, currentRegion);

            // --- DYNAMIC ROUTE & STATION EXTRACTOR ---
            const colorMap = {
                'text-green-500': '#22c55e',
                'text-orange-500': '#f97316',
                'text-purple-500': '#a855f7',
                'text-indigo-500': '#6366f1',
                'text-blue-500': '#3b82f6',
                'text-yellow-500': '#eab308',
                'text-red-500': '#ef4444'
            };

            const globalStations = {}; // { name: {lat, lon, origName, routes: Set()} }
            const drawnRoutes = []; // { name, color, isActive, coords: [] }
            const hubs = new Set();
            const ends = new Set();

            Object.values(ROUTES).forEach(route => {
                if (route.region !== currentRegion || route.id === 'special_event') return;

                // Track Hubs and Terminals to size markers properly later
                if (route.destA) ends.add(route.destA.replace(' STATION', '').trim().toUpperCase());
                if (route.destB) ends.add(route.destB.replace(' STATION', '').trim().toUpperCase());
                if (route.transferStation) hubs.add(route.transferStation.replace(' STATION', '').trim().toUpperCase());
                if (route.relayStation) hubs.add(route.relayStation.replace(' STATION', '').trim().toUpperCase());

                // Attempt to grab coordinate sequence from weekday_to_a, fallback to weekday_to_b
                let sheetKey = route.sheetKeys.weekday_to_a;
                let sheetData = mergedDb[sheetKey];
                
                if (!sheetData) {
                    sheetKey = route.sheetKeys.weekday_to_b;
                    sheetData = mergedDb[sheetKey];
                }

                if (!sheetData || !Array.isArray(sheetData)) return;

                // Dynamically find Header Row
                let headerIndex = -1;
                for (let i = 0; i < Math.min(sheetData.length, 5); i++) {
                    if (Object.values(sheetData[i]).some(val => val && String(val).toUpperCase().includes('STATION'))) {
                        headerIndex = i;
                        break;
                    }
                }

                if (headerIndex === -1) return;

                // Identify Keys
                let stationKey = null, coordKey = null;
                Object.keys(sheetData[headerIndex]).forEach(k => {
                    const v = String(sheetData[headerIndex][k]).toUpperCase();
                    if (v.includes('STATION')) stationKey = k;
                    if (v.includes('COORDINATES')) coordKey = k;
                });
                if (!stationKey) stationKey = 'STATION';
                if (!coordKey) coordKey = 'COORDINATES';

                let routeCoords = [];

                for(let i = headerIndex + 1; i < sheetData.length; i++) {
                    const row = sheetData[i];
                    if (!row[stationKey]) continue;
                    
                    const sNameOrig = String(row[stationKey]).trim();
                    if (sNameOrig.toLowerCase().includes('last updated') || sNameOrig.toLowerCase().includes('inter-station')) continue;

                    const sName = sNameOrig.replace(' STATION', '').toUpperCase();

                    let lat = null, lon = null;
                    const cVal = row[coordKey];
                    if (cVal) {
                        const parts = String(cVal).split(',').map(s => parseFloat(s.trim()));
                        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) { 
                            lat = parts[0]; lon = parts[1]; 
                        }
                    }

                    // 🛡️ GUARDIAN FIX: Rescue missing coordinates using hardcoded dictionary
                    if (lat === null && STATION_COORDINATES[sName]) {
                        lat = STATION_COORDINATES[sName][0];
                        lon = STATION_COORDINATES[sName][1];
                    }

                    // Rescue missing coordinates from previously mapped sheets
                    if (lat === null && globalStations[sName]) {
                        lat = globalStations[sName].lat;
                        lon = globalStations[sName].lon;
                    }

                    if (lat !== null && lon !== null) {
                        routeCoords.push([lat, lon]);
                        if (!globalStations[sName]) {
                            globalStations[sName] = { lat, lon, origName: sNameOrig, routes: new Set() };
                        }
                        globalStations[sName].routes.add(route.id);
                    }
                }

                if (routeCoords.length > 1) {
                     drawnRoutes.push({
                         name: route.name.replace('<->', '↔'),
                         color: colorMap[route.colorClass] || '#9ca3af',
                         isActive: route.isActive,
                         coords: routeCoords
                     });
                }
            });

            // 🛡️ GUARDIAN UX FIX: Empty Map Warning for Western Cape
            if (drawnRoutes.length === 0) {
                const warningBox = document.getElementById('empty-map-warning');
                if (warningBox) warningBox.classList.remove('hidden');
                return; // Stop drawing Leaflet elements
            }

            // --- DRAW ROUTES ---
            drawnRoutes.forEach(r => {
                L.polyline(r.coords, {
                    color: r.isActive ? r.color : '#9ca3af',
                    weight: r.isActive ? 4 : 2,
                    opacity: r.isActive ? 0.9 : 0.4,
                    dashArray: r.isActive ? null : '5, 10',
                    lineCap: 'round',
                    lineJoin: 'round',
                    smoothFactor: 1
                }).addTo(map).bindPopup(`<b class="uppercase text-sm">${r.name}</b><br>${r.isActive ? '<span class="text-green-600 font-bold text-xs">Active Service</span>' : '<span class="text-red-500 font-bold text-xs">Suspended</span>'}`);
            });

            // --- DRAW MARKERS ---
            Object.entries(globalStations).forEach(([name, data]) => {
                const isHub = hubs.has(name) || data.routes.size > 1;
                const isEnd = ends.has(name);
                const isMajor = isHub || isEnd;

                L.circleMarker([data.lat, data.lon], {
                    radius: isMajor ? 5 : 2.5,
                    fillColor: "#ffffff",
                    color: isMajor ? "#1f2937" : "#3b82f6",
                    weight: isMajor ? 2 : 1,
                    opacity: 1,
                    fillOpacity: 1
                }).addTo(map)
                  .bindPopup(`<b class="text-sm">${data.origName.replace(' STATION', '')}</b>`) 
                  .bindTooltip(data.origName.replace(' STATION', ''), { 
                      permanent: true, 
                      direction: 'top',
                      offset: [0, -5],
                      className: isMajor ? 'font-bold text-[11px] text-gray-800 bg-white/90 border border-gray-300 px-1 rounded shadow-sm z-50 tooltip-dynamic backdrop-blur-sm' : 'text-[9px] text-gray-600 bg-white/80 px-1 border border-gray-200 rounded shadow-sm tooltip-dynamic backdrop-blur-sm'
                  });
            });

            // --- BUILD LEGEND ---
            const legendContent = document.getElementById('legend-content');
            if (legendContent) {
                legendContent.innerHTML = ''; 
                drawnRoutes.forEach(item => {
                    legendContent.innerHTML += `
                        <div class="legend-item">
                            <span class="color-dot" style="background-color: ${item.color}"></span>
                            <span class="text-gray-700">${item.name}</span>
                            <span class="status-badge ${item.isActive ? 'bg-green-500' : 'bg-red-500'}">${item.isActive ? 'LIVE' : 'DOWN'}</span>
                        </div>
                    `;
                });
            }

            // --- CUSTOM CONTROLS (GUARDIAN) ---
            const LocateControl = L.Control.extend({
                options: { position: 'bottomright' },
                onAdd: function () {
                    const btn = L.DomUtil.create('button', 'bg-white text-blue-600 p-3 rounded-full shadow-2xl border border-gray-300 transition-transform transform active:scale-95 focus:outline-none flex items-center justify-center w-12 h-12 mb-4 mr-2');
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>';
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const icon = btn.querySelector('svg');
                        if(icon) icon.classList.add('animate-spin');
                        map.locate({setView: true, maxZoom: 16});
                    };
                    return btn;
                }
            });
            map.addControl(new LocateControl());

            // --- DYNAMIC TEXT RESIZING & VISIBILITY ---
            function updateTooltipSize() {
                const zoom = map.getZoom();
                const tooltips = document.querySelectorAll('.tooltip-dynamic');
                let display = 'block';
                if (zoom < 11) display = 'none'; 
                tooltips.forEach(t => { t.style.display = display; });
            }

            map.on('zoomend', updateTooltipSize);
            updateTooltipSize(); 
            
            // --- GUARDIAN PHASE C: LEAFLET GEOLOCATION (Pulsing Dot) ---
            let userMarker = null;
            let userRadius = null;
            const pulsingIcon = L.divIcon({
                className: 'custom-div-icon',
                html: '<div class="gps-pulse"></div>',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            map.on('locationfound', function(e) {
                const radius = e.accuracy / 2;
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, {icon: pulsingIcon}).addTo(map)
                        .bindPopup("<div class='text-xs font-bold text-center text-gray-900'>You are here<br><span class='text-[10px] text-gray-500 font-normal'>Within " + Math.round(radius) + " meters</span></div>");
                    userRadius = L.circle(e.latlng, radius, {
                        color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.15, weight: 1
                    }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                    userRadius.setLatLng(e.latlng);
                    userRadius.setRadius(radius);
                }
                
                const btnIcons = document.querySelectorAll('.animate-spin');
                btnIcons.forEach(i => i.classList.remove('animate-spin'));
            });

            map.on('locationerror', function(e) {
                const btnIcons = document.querySelectorAll('.animate-spin');
                btnIcons.forEach(i => i.classList.remove('animate-spin'));
                if (e.code !== 1) console.warn("Location error:", e.message);
            });

            map.locate({setView: false, watch: true, enableHighAccuracy: true});
        }

        function toggleLegend() {
            const content = document.getElementById('legend-content');
            const icon = document.getElementById('legend-icon');
            if(content) content.classList.toggle('collapsed');
            if(icon) icon.classList.toggle('rotated');
        }

        if (window.innerWidth < 640) {
            toggleLegend();
        }
    </script>
</body>
</html>
